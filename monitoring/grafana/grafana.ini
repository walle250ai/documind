[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
http_port = 3000

[database]

[session]

[analytics]
check_for_updates = true

[security]
admin_user = admin
admin_password = admin

[snapshots]

[users]

[auth]

[auth.basic]

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[dashboards.json]
enabled = true
path = /var/lib/grafana/dashboards

[log]
mode = console

[log.console]
level = info
